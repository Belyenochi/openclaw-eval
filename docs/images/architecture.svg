<svg width="720" height="560" viewBox="0 0 720 560" xmlns="http://www.w3.org/2000/svg" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .title { font-size:17px; font-weight:600; fill:#24292f; }
    .subtitle { font-size:13px; fill:#656d76; }
    .bt { font-size:14px; font-weight:600; text-anchor:middle; dominant-baseline:central; }
    .bs { font-size:11.5px; text-anchor:middle; dominant-baseline:central; }
    .zl { font-size:12px; font-weight:500; }
    .arr { stroke:#656d76; stroke-width:1.5; fill:none; }
    .n { font-size:11px; }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#656d76" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <rect width="720" height="560" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text class="title" x="360" y="34" text-anchor="middle">How openclaw-edd works</text>
  <text class="subtitle" x="360" y="54" text-anchor="middle">Plugin captures golden cases from chat · CLI replays them anywhere</text>

  <!-- ═══ Center: OpenClaw runtime ═══ -->
  <rect x="200" y="70" width="320" height="310" rx="14" fill="#fafbfc" stroke="#d0d7de" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="zl" x="360" y="90" text-anchor="middle" fill="#656d76">OpenClaw runtime</text>

  <rect x="240" y="104" width="240" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>
  <text class="bt" x="360" y="124" fill="#444441">User (DingTalk / CLI / Web)</text>

  <rect x="240" y="168" width="240" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="bt" x="360" y="186" fill="#3C3489">OpenClaw agent</text>
  <text class="bs" x="360" y="204" fill="#534AB7">Skills + MCP tools</text>

  <!-- Session files — THE data source -->
  <rect x="225" y="252" width="270" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text class="bt" x="360" y="270" fill="#633806">Session files (JSONL)</text>
  <text class="bs" x="360" y="290" fill="#854F0B">~/.openclaw/agents/{id}/sessions/</text>

  <!-- edd.yaml -->
  <rect x="240" y="330" width="240" height="36" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.6"/>
  <text class="bs" x="360" y="348" fill="#27500A" font-weight="600">&lt;workspace&gt;/skills/&lt;skill&gt;/edd.yaml</text>

  <!-- Internal arrows -->
  <line x1="360" y1="144" x2="360" y2="166" class="arr" marker-end="url(#ah)"/>
  <line x1="360" y1="220" x2="360" y2="250" class="arr" marker-end="url(#ah)"/>
  <text class="n" x="370" y="240" fill="#656d76">Writes events</text>

  <!-- ═══ Left: Plugin ═══ -->
  <rect x="16" y="110" width="168" height="270" rx="12" fill="#f5f0fe" stroke="#534AB7" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="zl" x="100" y="130" text-anchor="middle" fill="#534AB7">Plugin (in-process)</text>

  <rect x="30" y="148" width="140" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="bt" x="100" y="163" fill="#3C3489" font-size="13">/edd save</text>
  <text class="bs" x="100" y="181" fill="#534AB7">Snapshot last turn</text>

  <rect x="30" y="216" width="140" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="bt" x="100" y="231" fill="#3C3489" font-size="13">/edd</text>
  <text class="bs" x="100" y="249" fill="#534AB7">Run via subagent API</text>

  <rect x="30" y="290" width="140" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="bt" x="100" y="305" fill="#3C3489" font-size="13">Regression alert</text>
  <text class="bs" x="100" y="323" fill="#534AB7">⚠️ PASS / FAIL</text>

  <line x1="100" y1="194" x2="100" y2="214" class="arr" marker-end="url(#ah)"/>
  <line x1="100" y1="262" x2="100" y2="288" class="arr" marker-end="url(#ah)"/>

  <!-- Plugin reads session -->
  <path d="M170 171 L223 275" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- Plugin writes edd.yaml -->
  <path d="M170 320 L238 346" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ap)"/>

  <!-- ═══ Right: CLI ═══ -->
  <rect x="536" y="110" width="168" height="420" rx="12" fill="#f0faf6" stroke="#0F6E56" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="zl" x="620" y="130" text-anchor="middle" fill="#0F6E56">CLI (pip install)</text>

  <rect x="550" y="148" width="140" height="38" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
  <text class="bt" x="620" y="167" fill="#085041" font-size="13">watch</text>

  <rect x="550" y="202" width="140" height="38" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
  <text class="bt" x="620" y="221" fill="#085041" font-size="13">run</text>

  <rect x="550" y="256" width="140" height="38" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
  <text class="bt" x="620" y="275" fill="#085041" font-size="13">judge (LLM)</text>

  <rect x="550" y="316" width="140" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/>
  <text class="bt" x="620" y="331" fill="#712B13" font-size="13">EDD loop</text>
  <text class="bs" x="620" y="349" fill="#993C1D">suggest → diff</text>

  <rect x="550" y="384" width="140" height="38" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.6"/>
  <text class="bt" x="620" y="403" fill="#27500A" font-size="13">mine + export</text>

  <rect x="550" y="448" width="140" height="46" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>
  <text class="bt" x="620" y="463" fill="#444441" font-size="13">CI pipeline</text>
  <text class="bs" x="620" y="481" fill="#656d76">Exit code = gate</text>

  <!-- CLI internal arrows -->
  <line x1="620" y1="186" x2="620" y2="200" class="arr" marker-end="url(#ah)"/>
  <line x1="620" y1="240" x2="620" y2="254" class="arr" marker-end="url(#ah)"/>
  <line x1="620" y1="294" x2="620" y2="314" class="arr" marker-end="url(#ah)"/>
  <line x1="620" y1="362" x2="620" y2="382" class="arr" marker-end="url(#ah)"/>
  <line x1="620" y1="422" x2="620" y2="446" class="arr" marker-end="url(#ah)"/>

  <!-- CLI reads session files -->
  <path d="M495 280 Q524 280 548 221" fill="none" stroke="#0F6E56" stroke-width="2" marker-end="url(#at)"/>
  <rect x="498" y="240" width="48" height="16" rx="3" fill="#ffffff"/>
  <text class="n" x="522" y="252" text-anchor="middle" fill="#0F6E56" font-size="10" font-weight="600">Reads</text>

  <!-- CLI reads edd.yaml -->
  <path d="M480 348 Q526 348 548 230" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#at)"/>

  <!-- ═══ Bottom: shared format ═══ -->
  <rect x="120" y="412" width="380" height="36" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text class="bs" x="310" y="432" fill="#24292f" font-weight="600" font-size="12">Shared format: edd.yaml + report.json — Plugin ⇄ CLI ⇄ CI</text>

  <path d="M100 336 L100 394 L200 430 L218 430" fill="none" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="3 3"/>
  <path d="M550 403 L520 430 L502 430" fill="none" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="3 3"/>

  <!-- KEY CALLOUT: how /edd save works -->
  <rect x="20" y="480" width="320" height="60" rx="8" fill="#f5f0fe" stroke="#CECBF6" stroke-width="0.6"/>
  <text x="180" y="500" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Plugin workflow</text>
  <text x="180" y="518" text-anchor="middle" font-size="11" fill="#534AB7">Good interaction → /edd save → edit skill → /edd → check</text>

  <rect x="380" y="480" width="320" height="60" rx="8" fill="#f0faf6" stroke="#9FE1CB" stroke-width="0.6"/>
  <text x="540" y="500" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">CLI workflow</text>
  <text x="540" y="518" text-anchor="middle" font-size="11" fill="#0F6E56">openclaw-edd run → suggest → fix → diff → CI gate</text>

</svg>