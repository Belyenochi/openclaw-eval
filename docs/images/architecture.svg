<svg width="720" height="490" viewBox="0 0 720 490" xmlns="http://www.w3.org/2000/svg" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .bt { font-size:14px; font-weight:600; text-anchor:middle; dominant-baseline:central; }
    .bs { font-size:11.5px; text-anchor:middle; dominant-baseline:central; }
    .zl { font-size:12px; font-weight:500; }
    .arr { stroke:#656d76; stroke-width:1.5; fill:none; }
    .n { font-size:11px; }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#656d76" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <rect width="720" height="490" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>

  <!-- ═══ Center: OpenClaw runtime ═══ -->
  <rect x="200" y="20" width="320" height="300" rx="14" fill="#fafbfc" stroke="#d0d7de" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="zl" x="360" y="40" text-anchor="middle" fill="#656d76">OpenClaw runtime</text>

  <rect x="240" y="56" width="240" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>
  <text class="bt" x="360" y="76" fill="#444441">User (DingTalk / CLI / Web)</text>

  <rect x="240" y="120" width="240" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="bt" x="360" y="138" fill="#3C3489">OpenClaw agent</text>
  <text class="bs" x="360" y="156" fill="#534AB7">Skills + MCP tools</text>

  <!-- Session files -->
  <rect x="225" y="204" width="270" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text class="bt" x="360" y="222" fill="#633806">Session files (JSONL)</text>
  <text class="bs" x="360" y="242" fill="#854F0B">~/.openclaw/agents/{id}/sessions/</text>

  <!-- edd.yaml -->
  <rect x="240" y="282" width="240" height="30" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.6"/>
  <text class="bs" x="360" y="297" fill="#27500A" font-weight="600">&lt;workspace&gt;/skills/&lt;skill&gt;/edd.yaml</text>

  <!-- Internal arrows -->
  <line x1="360" y1="96" x2="360" y2="118" class="arr" marker-end="url(#ah)"/>
  <line x1="360" y1="172" x2="360" y2="202" class="arr" marker-end="url(#ah)"/>
  <text class="n" x="370" y="192" fill="#656d76">Writes events</text>

  <!-- ═══ Left: Plugin ═══ -->
  <rect x="16" y="60" width="168" height="262" rx="12" fill="#f5f0fe" stroke="#534AB7" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="zl" x="100" y="80" text-anchor="middle" fill="#534AB7">Plugin (in-process)</text>

  <rect x="30" y="98" width="140" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="bt" x="100" y="113" fill="#3C3489" font-size="13">/edd save</text>
  <text class="bs" x="100" y="131" fill="#534AB7">Snapshot last turn</text>

  <rect x="30" y="166" width="140" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="bt" x="100" y="181" fill="#3C3489" font-size="13">/edd</text>
  <text class="bs" x="100" y="199" fill="#534AB7">Run via subagent API</text>

  <rect x="30" y="240" width="140" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="bt" x="100" y="255" fill="#3C3489" font-size="13">Regression alert</text>
  <text class="bs" x="100" y="273" fill="#534AB7">⚠️ PASS / FAIL</text>

  <line x1="100" y1="144" x2="100" y2="164" class="arr" marker-end="url(#ah)"/>
  <line x1="100" y1="212" x2="100" y2="238" class="arr" marker-end="url(#ah)"/>

  <!-- Plugin reads session -->
  <path d="M170 121 L223 225" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- Plugin writes edd.yaml -->
  <path d="M170 270 L238 296" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ap)"/>

  <!-- ═══ Right: CLI ═══ -->
  <rect x="536" y="60" width="168" height="360" rx="12" fill="#f0faf6" stroke="#0F6E56" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="zl" x="620" y="80" text-anchor="middle" fill="#0F6E56">CLI (pip install)</text>

  <rect x="550" y="98" width="140" height="38" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
  <text class="bt" x="620" y="117" fill="#085041" font-size="13">watch</text>

  <rect x="550" y="152" width="140" height="38" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
  <text class="bt" x="620" y="171" fill="#085041" font-size="13">run</text>

  <rect x="550" y="206" width="140" height="38" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
  <text class="bt" x="620" y="225" fill="#085041" font-size="13">judge (LLM)</text>

  <rect x="550" y="264" width="140" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/>
  <text class="bt" x="620" y="279" fill="#712B13" font-size="13">EDD loop</text>
  <text class="bs" x="620" y="297" fill="#993C1D">suggest → diff</text>

  <rect x="550" y="330" width="140" height="38" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.6"/>
  <text class="bt" x="620" y="349" fill="#27500A" font-size="13">mine + export</text>

  <rect x="550" y="388" width="140" height="26" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>
  <text class="bs" x="620" y="401" fill="#444441" font-weight="600">CI pipeline</text>

  <!-- CLI internal arrows -->
  <line x1="620" y1="136" x2="620" y2="150" class="arr" marker-end="url(#ah)"/>
  <line x1="620" y1="190" x2="620" y2="204" class="arr" marker-end="url(#ah)"/>
  <line x1="620" y1="244" x2="620" y2="262" class="arr" marker-end="url(#ah)"/>
  <line x1="620" y1="310" x2="620" y2="328" class="arr" marker-end="url(#ah)"/>
  <line x1="620" y1="368" x2="620" y2="386" class="arr" marker-end="url(#ah)"/>

  <!-- CLI reads session files -->
  <path d="M495 230 Q524 230 548 171" fill="none" stroke="#0F6E56" stroke-width="2" marker-end="url(#at)"/>
  <rect x="498" y="190" width="48" height="16" rx="3" fill="#ffffff"/>
  <text class="n" x="522" y="202" text-anchor="middle" fill="#0F6E56" font-size="10" font-weight="600">Reads</text>

  <!-- CLI reads edd.yaml -->
  <path d="M480 296 Q526 296 548 180" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#at)"/>

  <!-- ═══ Bottom: shared format ═══ -->
  <rect x="60" y="440" width="600" height="34" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text class="bs" x="360" y="459" fill="#24292f" font-weight="600" font-size="12">Shared format: edd.yaml + report.json — Plugin ⇄ CLI ⇄ CI</text>

  <path d="M100 286 L100 340 L160 457 L158 457" fill="none" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="3 3"/>
  <path d="M550 349 L520 457 L518 457" fill="none" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="3 3"/>

</svg>