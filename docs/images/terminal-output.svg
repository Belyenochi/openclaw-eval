<svg width="720" height="780" viewBox="0 0 720 780" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill:#1a1b26; }
    .bar { fill:#16161e; }
    .d { fill:#a9b1d6; font-family:'SF Mono','Fira Code','Cascadia Code',Menlo,Consolas,monospace; font-size:12.5px; }
    .dim { fill:#565f89; }
    .blu { fill:#7aa2f7; }
    .pur { fill:#bb9af7; }
    .grn { fill:#73daca; }
    .red { fill:#f7768e; }
    .yel { fill:#e0af68; }
    .btxt { fill:#565f89; font-family:'SF Mono','Fira Code','Cascadia Code',Menlo,Consolas,monospace; font-size:11px; }
  </style>

  <!-- Terminal 1: /edd save (Plugin) -->
  <rect x="0" y="0" width="720" height="200" rx="10" class="bg"/>
  <rect x="0" y="0" width="720" height="30" rx="10" class="bar"/>
  <rect x="0" y="20" width="720" height="10" class="bar"/>
  <circle cx="18" cy="15" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="6" fill="#febc2e"/>
  <circle cx="58" cy="15" r="6" fill="#28c840"/>
  <text class="btxt" x="360" y="19" text-anchor="middle">OpenClaw Chat — /edd save</text>

  <g class="d">
    <text x="16" y="56"><tspan class="dim">user:</tspan> Any slow queries in MySQL recently?</text>
    <text x="16" y="78"><tspan class="dim">agent:</tspan> <tspan class="grn">✓ exec</tspan> → query_metrics → <tspan class="grn">"P99 latency 120ms, exceeds threshold"</tspan></text>
    <text x="16" y="104"><tspan class="dim">user:</tspan> <tspan class="pur">/edd save mysql-sre</tspan></text>
    <text x="16" y="130"><tspan class="grn">✅ Saved golden case for skill "mysql-sre"</tspan></text>
    <text x="16" y="150">   Message: "Any slow queries in MySQL recently?"</text>
    <text x="16" y="170">   Expected tools: <tspan class="blu">exec, query_metrics</tspan></text>
    <text x="16" y="190">   Saved to: <tspan class="dim">skills/mysql-sre/edd.yaml</tspan></text>
  </g>

  <!-- Terminal 2: CLI run -->
  <rect x="0" y="218" width="720" height="330" rx="10" class="bg"/>
  <rect x="0" y="218" width="720" height="30" rx="10" class="bar"/>
  <rect x="0" y="238" width="720" height="10" class="bar"/>
  <circle cx="18" cy="233" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="233" r="6" fill="#febc2e"/>
  <circle cx="58" cy="233" r="6" fill="#28c840"/>
  <text class="btxt" x="360" y="237" text-anchor="middle">openclaw-edd run --cases skills/*/edd.yaml --agent main</text>

  <g class="d">
    <text x="16" y="270"><tspan class="dim">$</tspan> <tspan class="blu">openclaw-edd</tspan> run --cases skills/*/edd.yaml --agent main</text>
    <text x="16" y="296" class="pur">⚡ openclaw-edd v0.4.3</text>
    <text x="16" y="312" class="dim">─────────────────────────────────────────────────────</text>
    <text x="16" y="332" class="blu">📋 Loading 5 cases from 2 skills...</text>

    <text x="16" y="358"><tspan class="grn">✓ PASS</tspan>  mysql_slow_query          <tspan class="dim">tools: exec→query_metrics  (2.1s)</tspan></text>
    <text x="16" y="378"><tspan class="grn">✓ PASS</tspan>  mysql_connection_pool     <tspan class="dim">tools: exec→check_health   (1.8s)</tspan></text>
    <text x="16" y="398"><tspan class="red">✗ FAIL</tspan>  mysql_replication_lag     <tspan class="dim">tools: exec                (3.2s)</tspan></text>
    <text x="80" y="416" class="red">missing tool: query_metrics</text>
    <text x="16" y="436"><tspan class="grn">✓ PASS</tspan>  redis_memory_alert        <tspan class="dim">tools: exec→alert_check    (1.5s)</tspan></text>
    <text x="16" y="456"><tspan class="grn">✓ PASS</tspan>  network_latency_check     <tspan class="dim">tools: exec→ping           (1.2s)</tspan></text>

    <text x="16" y="478" class="dim">─────────────────────────────────────────────────────</text>
    <text x="16" y="498"><tspan class="pur">📊 Results:</tspan> Passed: <tspan class="grn">4/5</tspan>  (<tspan class="yel">80%</tspan>)  <tspan class="red">← 1 regression</tspan></text>
    <text x="16" y="518" class="dim">   FAIL: mysql_replication_lag</text>
    <text x="16" y="538"><tspan class="blu">💡 Next:</tspan> openclaw-edd edd suggest --report report.json</text>
  </g>

  <!-- Terminal 3: diff -->
  <rect x="0" y="566" width="720" height="214" rx="10" class="bg"/>
  <rect x="0" y="566" width="720" height="30" rx="10" class="bar"/>
  <rect x="0" y="586" width="720" height="10" class="bar"/>
  <circle cx="18" cy="581" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="581" r="6" fill="#febc2e"/>
  <circle cx="58" cy="581" r="6" fill="#28c840"/>
  <text class="btxt" x="360" y="585" text-anchor="middle">openclaw-edd edd diff --before round1.json --after round2.json</text>

  <g class="d">
    <text x="16" y="618"><tspan class="dim">$</tspan> <tspan class="blu">openclaw-edd</tspan> edd diff --before round1.json --after round2.json</text>
    <text x="16" y="644" class="pur">📊 Diff Report</text>
    <text x="16" y="660" class="dim">─────────────────────────────────────────────────────</text>
    <text x="32" y="680">Overall: <tspan class="yel">80%</tspan> → <tspan class="grn">100%</tspan>  <tspan class="grn">▲ +20%</tspan></text>
    <text x="32" y="706" class="grn">🔧 Fixed:</text>
    <text x="52" y="726">mysql_replication_lag    <tspan class="red">FAIL</tspan> → <tspan class="grn">PASS</tspan></text>
    <text x="32" y="750" class="grn">✓ All 5 cases passing — ready for CI gate</text>
    <text x="16" y="772"><tspan class="blu">💡 Next:</tspan> add to CI: openclaw-edd run --cases skills/*/edd.yaml --exit-code</text>
  </g>
</svg>