<svg width="720" height="860" viewBox="0 0 720 860" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill:#1a1b26; }
    .bar { fill:#16161e; }
    .d { fill:#a9b1d6; font-family:'SF Mono','Fira Code','Cascadia Code',Menlo,Consolas,monospace; font-size:12.5px; }
    .dim { fill:#565f89; }
    .blu { fill:#7aa2f7; }
    .pur { fill:#bb9af7; }
    .grn { fill:#73daca; }
    .red { fill:#f7768e; }
    .yel { fill:#e0af68; }
    .wh { fill:#c0caf5; }
    .btxt { fill:#565f89; font-family:'SF Mono','Fira Code','Cascadia Code',Menlo,Consolas,monospace; font-size:11px; }
    .step { fill:#414868; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:12px; font-weight:600; }
  </style>

  <!-- Step label 1 -->
  <text class="step" x="16" y="16">① Good interaction → /edd save</text>

  <!-- Terminal 1: /edd save -->
  <rect x="0" y="26" width="720" height="186" rx="10" class="bg"/>
  <rect x="0" y="26" width="720" height="28" rx="10" class="bar"/>
  <rect x="0" y="46" width="720" height="8" class="bar"/>
  <circle cx="16" cy="40" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="40" r="5" fill="#febc2e"/>
  <circle cx="48" cy="40" r="5" fill="#28c840"/>
  <text class="btxt" x="360" y="43" text-anchor="middle">OpenClaw — mysql-sre agent</text>

  <g class="d">
    <text x="16" y="74"><tspan class="dim">user</tspan><tspan class="wh">  MySQL 最近有慢查询吗？</tspan></text>
    <text x="16" y="96"><tspan class="dim">agent</tspan> <tspan class="grn">exec</tspan>(check_health prod-01) → <tspan class="grn">query_metrics</tspan>(p99_latency 1h)</text>
    <text x="16" y="116"><tspan class="dim">     </tspan> <tspan class="wh">"检测到慢查询，P99 延迟 120ms，超过阈值"</tspan></text>
    <text x="16" y="146"><tspan class="dim">user</tspan><tspan class="pur">  /edd save mysql-sre</tspan></text>
    <text x="16" y="170"><tspan class="grn">✅ Saved golden case for skill "mysql-sre"</tspan></text>
    <text x="16" y="190">   Expected tools: <tspan class="blu">exec, query_metrics</tspan>  Saved to: <tspan class="dim">skills/mysql-sre/edd.yaml</tspan></text>
  </g>

  <!-- Step label 2 -->
  <text class="step" x="16" y="234">② Edit skill → /edd catches regression</text>

  <!-- Terminal 2: /edd run via plugin -->
  <rect x="0" y="244" width="720" height="244" rx="10" class="bg"/>
  <rect x="0" y="244" width="720" height="28" rx="10" class="bar"/>
  <rect x="0" y="264" width="720" height="8" class="bar"/>
  <circle cx="16" cy="258" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="258" r="5" fill="#febc2e"/>
  <circle cx="48" cy="258" r="5" fill="#28c840"/>
  <text class="btxt" x="360" y="261" text-anchor="middle">OpenClaw — /edd</text>

  <g class="d">
    <text x="16" y="292"><tspan class="dim">user</tspan><tspan class="pur">  /edd</tspan></text>
    <text x="16" y="320"><tspan class="pur">🧪 EDD: 2/3 passed — 1 regression(s)</tspan></text>
    <text x="16" y="348">  <tspan class="grn">✅</tspan> "MySQL 最近有慢查询吗" <tspan class="grn">passed</tspan> <tspan class="dim">(2340ms)</tspan></text>
    <text x="16" y="370">  <tspan class="grn">✅</tspan> "检查连接池状态" <tspan class="grn">passed</tspan> <tspan class="dim">(1820ms)</tspan></text>
    <text x="16" y="392">  <tspan class="red">❌</tspan> "主从复制延迟多少" <tspan class="red">failed</tspan> <tspan class="yel">⚠️ REGRESSION</tspan> <tspan class="dim">(3210ms)</tspan></text>
    <text x="16" y="412">     <tspan class="red">expected tool "query_metrics" not called</tspan></text>
    <text x="16" y="440" class="dim">─────────────────────────────────────────────────────</text>
    <text x="16" y="460"><tspan class="dim">💡</tspan> <tspan class="wh">Fix your skill, then run /edd again to verify.</tspan></text>
    <text x="16" y="478"><tspan class="dim">   CLI equivalent:</tspan> openclaw-edd run --cases skills/mysql-sre/edd.yaml</text>
  </g>

  <!-- Step label 3 -->
  <text class="step" x="16" y="510">③ Fix skill → CLI diff confirms improvement</text>

  <!-- Terminal 3: CLI diff -->
  <rect x="0" y="520" width="720" height="330" rx="10" class="bg"/>
  <rect x="0" y="520" width="720" height="28" rx="10" class="bar"/>
  <rect x="0" y="540" width="720" height="8" class="bar"/>
  <circle cx="16" cy="534" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="534" r="5" fill="#febc2e"/>
  <circle cx="48" cy="534" r="5" fill="#28c840"/>
  <text class="btxt" x="360" y="537" text-anchor="middle">Terminal</text>

  <g class="d">
    <text x="16" y="568"><tspan class="dim">$</tspan> <tspan class="blu">openclaw-edd</tspan> run --cases skills/mysql-sre/edd.yaml --agent main \</text>
    <text x="16" y="586">    --output-json round2.json</text>
    <text x="16" y="612" class="pur">⚡ openclaw-edd v0.5.0</text>
    <text x="16" y="628" class="dim">────────────────────────────────────────────────────────────</text>
    <text x="16" y="648">Case: <tspan class="wh">mysql_slow_query</tspan></text>
    <text x="16" y="666">  [<tspan class="grn">✓ PASS</tspan>] 2.1s</text>
    <text x="16" y="684">  Tool chain: <tspan class="blu">exec, query_metrics</tspan></text>
    <text x="16" y="706">Case: <tspan class="wh">mysql_replication_lag</tspan></text>
    <text x="16" y="724">  [<tspan class="grn">✓ PASS</tspan>] 2.8s</text>
    <text x="16" y="742">  Tool chain: <tspan class="blu">exec, query_metrics</tspan></text>
    <text x="16" y="762" class="dim">────────────────────────────────────────────────────────────</text>
    <text x="16" y="782">complete: <tspan class="grn">3/3 Passed (100%)</tspan></text>
    <text x="16" y="808"><tspan class="dim">$</tspan> <tspan class="blu">openclaw-edd</tspan> edd diff --before round1.json --after round2.json</text>
    <text x="16" y="832">Overall: <tspan class="yel">66%</tspan> → <tspan class="grn">100%</tspan>  <tspan class="grn">▲ +34%</tspan>  Fixed: <tspan class="wh">mysql_replication_lag</tspan> <tspan class="red">FAIL</tspan>→<tspan class="grn">PASS</tspan></text>
  </g>
</svg>